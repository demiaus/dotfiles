# Finnish (ficode) mappings
# https://github.com/krumeluu/ficode
#

[ids]

*

[main]
  capslock = overload(nav, esc)
  esc = capslock
  a = a
  b = b
  c = c
  d = d
  e = e
  f = f
  g = g
  h = h
  i = i
  j = j
  k = k
  l = l
  m = m
  n = n
  o = o
  p = p
  q = q
  r = r
  s = s
  t = t
  u = u
  v = v
  w = w
  x = x
  y = y
  z = z
  ' = ä
  , = ,
  . = .
  / = /
  ; = ö
  [ = [
  \ = '
  ` = `
  - = -
  = = =
  shift = layer(shift)
  altgr = layer(altgr)


[shift:S]
  a = A
  b = B
  c = C
  d = D
  e = E
  f = F
  g = G
  h = H
  i = I
  j = J
  k = K
  l = L
  m = M
  n = N
  o = O
  p = P
  q = Q
  r = R
  s = S
  t = T
  u = U
  v = V
  w = W
  x = X
  y = Y
  z = Z
  ' = Ä
  , = ;
  . = :
  / = \
  ; = Ö
  [ = {
  ] = }
  \ = ?
  ` = ~
  1 = !
  2 = "
  3 = #
  4 = $
  5 = %
  6 = ^
  7 = &
  8 = *
  9 = (
  0 = )
  - = _
  = = +

[altgr:G]
  1 = ¡
  2 = @
  3 = £
  4 = ¤
  5 = ‰
  0 = °
  e = €
  o = œ
  t = ™
  a = å
  c = ©
  r = ®
  < = |
  ' = æ

  - = oneshot(macron)
  \ = oneshot(grave)
  ` = oneshot(tilde)
  ] = oneshot(acute)
  \ = oneshot(grave)
  v = oneshot(caron)
  6 = oneshot(circumflex)
  g = oneshot(greek)

[shift+altgr]
  a = Å
  o = Œ
  < = |
  ' = Æ
  - = —
  \ = ¿

#AltGr+]
[acute]
  a = á
  e = é
  i = í 
  o = ó
  u = ú
  r = ŕ
  s = ś
  y = ý
  shift = oneshot(ACUTE)
[ACUTE]      
  a = Á
  e = É
  i = Í
  o = Ó
  u = Ú
  r = Ŕ
  s = Ś
  y = Ý

#AltGr+'
[grave]
  a = à
  e = è
  i = ì
  o = ò
  u = ù
  shift = oneshot(GRAVE)
[GRAVE]      
  a = À
  e = È
  i = Ì
  o = Ò
  u = Ù

#AltGr+`
[tilde]
  a = ã
  n = ñ
  o = õ
  shift = oneshot(TILDE)
[TILDE]      
  a = Ã
  n = Ñ
  o = Õ

