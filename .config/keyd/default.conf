# Finnish (ficode) mappings
# https://github.com/krumeluu/ficode
#

[ids]

*

# Main {{{
[main]
capslock = overload(nav, esc)
esc = capslock
a = a
b = b
c = c
d = d
e = e
f = f
g = g
h = h
i = i
j = j
k = k
l = l
m = m
n = n
o = o
p = p
q = q
r = r
s = s
t = t
u = u
v = v
w = w
x = x
y = y
z = z
' = ä
; = ö

, = ,
. = .
/ = /
[ = [
] = ]
\ = '
` = `
- = -
= = =

kpdot = ,

shift = layer(shift)
altgr = layer(altgr)
# }}}

# Shift {{{
[shift:S]
a = A
b = B
c = C
d = D
e = E
f = F
g = G
h = H
i = I
j = J
k = K
l = L
m = M
n = N
o = O
p = P
q = Q
r = R
s = S
t = T
u = U
v = V
w = W
x = X
y = Y
z = Z
' = Ä
; = Ö

, = ;
. = :
/ = \
[ = {
] = }
\ = "
` = ~

1 = !
2 = ?
3 = #
4 = $
5 = %
6 = ^
7 = &
8 = *
9 = (
0 = )
- = _
= = +

kpdot = .

# }}}

# AltGr {{{
[altgr:G]
1 = ¡
2 = @
3 = £
4 = ¤
5 = ‰
0 = °
e = €
o = œ
t = ™
a = å
c = ©
r = ®
102nd = |
' = æ
shift = oneshot(ALTGR)
- = oneshot(macron)
\ = oneshot(grave)
` = oneshot(tilde)
] = oneshot(acute)
\ = oneshot(grave)
v = oneshot(caron)
6 = oneshot(circumflex)
g = oneshot(greek)

[ALTGR:S-G]
a = Å
o = Œ
102nd = |
' = Æ
- = —
\ = ¿
# }}}

# AltGr + ] (Acute) {{{
[acute]
shift = oneshot(ACUTE)
a = á
e = é
i = í
o = ó
u = ú
r = ŕ
s = ś
y = ý

[ACUTE:S]
a = Á
e = É
i = Í
o = Ó
u = Ú
r = Ŕ
s = Ś
y = Ý
# }}}

# AltGr + ' (Grave) {{{
[grave]

shift = oneshot(GRAVE)
a = à
e = è
i = ì
o = ò
u = ù

[GRAVE]
a = À
e = È
i = Ì
o = Ò
u = Ù
# }}}

# AltGr + ` (Tilde) {{{
[tilde]
shift = oneshot(TILDE)
a = ã
n = ñ
o = õ

[TILDE]
a = Ã
n = Ñ
o = Õ
# }}}

# AltGr + 6 (Circumflex) {{{
# TODO
[circumflex]
shift = oneshot(CIRCUMFLEX)

[CIRCUMFLEX]
# }}}

# AltGr + v (Caron) {{{
[caron]
shift = oneshot(CARON)
s = š 
z = ź

[CARON:S]
s = Š
z = Ž
# }}}

# AltGr + - (Macron) {{{
[macron]
# TODO
shift = oneshot(MACRON)

[MACRON]
# TODO
# }}}

# AltGr + g (Greek) {{{
[greek]
shift = layout(GREEK)
a = α
b = β
g = γ
d = δ
e = ε
z = ζ
h = η
f = θ
i = ι
k = κ
l = λ
m = μ
n = ν
o = ω
x = ξ
p = π
r = ρ
s = σ
t = τ
y = υ
o = ω
# TODO:
# These are still missing: Ο ο, Φ φ, Χ χ, Ψ ψ,

[GREEK]
# }}}

# CapsLock (Navigation) {{{
[nav]
h = left
k = up
j = down
l = right
shift = layer(NAV)

[NAV]
h = C-left
j = C-down
k = C-up
l = C-right
# }}}


