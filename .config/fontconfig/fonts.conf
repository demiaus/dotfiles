<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>

<!-- Default font (no fc-match pattern) -->
 <match>
  <edit mode="prepend" name="family">
   <string>CozetteVector Nerd Font</string>
  </edit>
 </match>

<!-- Default sans-serif font -->
 <match target="pattern">
   <test qual="any" name="family"><string>sans-serif</string></test>
   <edit name="family" mode="prepend" binding="same"><string>CozetteVector Nerd Font</string></edit>
   <!-- <edit name="family" mode="prepend" binding="same"><string>Liberation Sans</string></edit> -->
   <edit name="family" mode="append"  binding="same"><string>OCRA</string></edit>
   <edit name="family" mode="append"  binding="same"><string>DejaVu Sans</string></edit>
   <edit name="family" mode="append"  binding="same"><string>Symbola</string></edit>
   <edit name="family" mode="append"  binding="same"><string>Noto Sans</string></edit>
 </match>

<!-- Default serif fonts -->
 <match target="pattern">
   <test qual="any" name="family"><string>serif</string></test>
   <edit name="family" mode="prepend" binding="same"><string>CozetteVector Nerd Font</string></edit>
   <!-- <edit name="family" mode="prepend" binding="same"><string>Liberation Serif</string></edit> -->
   <edit name="family" mode="append"  binding="same"><string>DejaVu Serif</string></edit>
   <edit name="family" mode="append"  binding="same"><string>Symbola</string></edit>
   <edit name="family" mode="append"  binding="same"><string>Noto Serif</string></edit>
 </match>

<!-- Default monospace fonts -->
 <match target="pattern">
   <test qual="any" name="family"><string>monospace</string></test>
   <edit name="family" mode="prepend" binding="same"><string>CozetteVector Nerd Font</string></edit>
   <!-- <edit name="family" mode="prepend" binding="same"><string>Liberation Mono</string></edit> -->
   <edit name="family" mode="append"  binding="same"><string>DejaVu Sans Mono</string></edit>
   <edit name="family" mode="append"  binding="same"><string>Symbola</string></edit>
   <edit name="family" mode="append"  binding="same"><string>Noto Sans Mono</string></edit>
 </match>

</fontconfig>
